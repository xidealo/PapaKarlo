name: Publish workflow ios

on:
  push:
    branches:
      - feature/ios-cd
      # Позже включить релиз по push в master:
      # - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: "Upload secrets"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Decode google-services.json"
        env:
          GOOGLE_SERVICE_JSON: ${{ secrets.GOOGLE_SERVICE_JSON }}
        run: echo "${GOOGLE_SERVICE_JSON}" > app/google-services.json
      - name: "Upload google-services.json"
        uses: actions/upload-artifact@v4
        with:
          name: google-services
          path: app/google-services.json
      - name: "Decode local.properties"
        env:
          RELEASE_STORE_FILE: ${{ secrets.RELEASE_STORE_FILE }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo -e "RELEASE_STORE_FILE=$RELEASE_STORE_FILE" > local.properties
          echo -e "RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" >> local.properties
          echo -e "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> local.properties
          echo -e "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> local.properties
      - name: "Upload local.properties"
        uses: actions/upload-artifact@v4
        with:
          name: local-properties
          path: local.properties
      - name: "Decode keystore"
        env:
          KEY_STORE: ${{ secrets.KEY_STORE }}
        run: echo "${KEY_STORE}" | base64 --decode > app/keystore
      - name: "Upload keystore"
        uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: app/keystore
      - name: "Decode google-play-api-key.json"
        env:
          GOOGLE_PLAY_API_KEY: ${{ secrets.GOOGLE_PLAY_API_KEY }}
        run: echo "${GOOGLE_PLAY_API_KEY}" | base64 --decode > app/google-play-api-key.json
      - name: "Upload google-play-api-key.json"
        uses: actions/upload-artifact@v4
        with:
          name: google-play-api-key
          path: app/google-play-api-key.json

  build:
    runs-on: macos-latest
    needs: setup
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "Decode Firebase GoogleService-Info.plist files"
        env:
          IOS_FIREBASE_PLISTS_TAR_BASE64: ${{ secrets.IOS_FIREBASE_PLISTS_TAR_BASE64 }}
        run: |
          echo "$IOS_FIREBASE_PLISTS_TAR_BASE64" | base64 --decode > firebase-plists.tar.gz
          tar -xzf firebase-plists.tar.gz
          rm firebase-plists.tar.gz

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: iosApp

      - name: "Download google-services.json"
        uses: actions/download-artifact@v4
        with:
          name: google-services
          path: ./app

      - name: "Download local.properties"
        uses: actions/download-artifact@v4
        with:
          name: local-properties
          path: .

      - name: "Download keystore"
        uses: actions/download-artifact@v4
        with:
          name: keystore
          path: ./app

      - name: "Download google-play-api-key.json"
        uses: actions/download-artifact@v4
        with:
          name: google-play-api-key
          path: ./app

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Generate KMP dummy framework
        working-directory: .
        run: ./gradlew :shared:generateDummyFramework

      - name: Install Pods
        working-directory: iosApp
        run: pod install --repo-update

      - name: Decode App Store Connect API key
        working-directory: iosApp
        run: |
          mkdir -p fastlane/keys
          echo "${{ secrets.APP_STORE_P8_BASE64 }}" | base64 --decode > fastlane/keys/AuthKey.p8
          chmod 600 fastlane/keys/AuthKey.p8

      - name: Build, upload and submit all apps for App Store review
        working-directory: iosApp
        env:
          MATCH_GIT_BASIC_AUTHORIZATION : ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION  }}
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_P8_PATH: fastlane/keys/AuthKey.p8
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_READONLY: "true"
        run: bundle exec fastlane ios deployAll
