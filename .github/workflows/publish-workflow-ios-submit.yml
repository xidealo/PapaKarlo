name: Publish workflow ios (submit)

on:
  workflow_run:
    workflows: ["Publish workflow ios (upload)"]
    types: [completed]
    branches: [master]

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  submit:
    # Only after automatic master push upload — not after manual canary workflow_dispatch
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        app:
          - papakarlo
          - gustopub
          - yuliar
          - tandirhouse
          - vkuskavkaza
          - djan
          - usaba
          - emoji
          - estpoest
          - taverna
          - voljane

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: iosApp

      - name: Decode App Store Connect API key
        working-directory: iosApp
        run: |
          mkdir -p fastlane/keys
          echo "${{ secrets.APP_STORE_P8_BASE64 }}" | base64 --decode > fastlane/keys/AuthKey.p8
          chmod 600 fastlane/keys/AuthKey.p8

      - name: Download build numbers from upload workflow
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ios-upload-build-numbers
          path: iosApp/fastlane
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Submit app for App Store review
        working-directory: iosApp
        env:
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_P8_PATH: fastlane/keys/AuthKey.p8
        run: |
          echo "Submit ${{ matrix.app }}: билд из upload_build_numbers.json или последний в ASC"
          bundle exec fastlane ios submit_${{ matrix.app }}
