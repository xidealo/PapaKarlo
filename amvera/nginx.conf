# WebSocket upgrade helper: "upgrade" when the client requests it, else "close".
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver so upstream hostnames are resolved at request time, not once at
    # startup. Without this nginx fails to boot ("host not found in upstream") when
    # DNS is briefly unavailable during container start.
    resolver 8.8.8.8 1.1.1.1 valid=300s ipv6=off;

    # The JS/WASM bundle is large, so compress text assets.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types application/javascript application/wasm text/css application/json image/svg+xml;

    # NOTE: do NOT add a `types { ... }` block here — it would REPLACE the whole
    # MIME table and everything (html, js, css) would be served as
    # application/octet-stream. The default mime.types already maps .wasm correctly.

    # Product photos on Firebase Storage (no CORS) -> proxied through same origin.
    # Matches FirebaseImageProxyMapper, which rewrites photoLinks to /firebase-img/...
    location /firebase-img/ {
        set $firebase_host firebasestorage.googleapis.com;
        rewrite ^/firebase-img/(.*)$ /$1 break;
        proxy_pass https://$firebase_host;
        proxy_set_header Host firebasestorage.googleapis.com;
        proxy_ssl_server_name on;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Product photos on Yandex Object Storage (no CORS) -> proxied through same origin.
    # Matches YandexImageProxyMapper, which rewrites photoLinks to /yandex-img/...
    location /yandex-img/ {
        set $yandex_host fooddelivery-s3-test.storage.yandexcloud.net;
        rewrite ^/yandex-img/(.*)$ /$1 break;
        proxy_pass https://$yandex_host;
        proxy_set_header Host fooddelivery-s3-test.storage.yandexcloud.net;
        proxy_ssl_server_name on;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Root must serve the SPA entry point. Without this the "/" request falls
    # through try_files to @backend and returns 404.
    location = / {
        try_files /index.html =404;
    }

    # Serve the static file if it exists (js/wasm/html/composeResources),
    # otherwise treat it as an API call and forward it to the backend.
    location / {
        try_files $uri @backend;
    }

    # Backend API + WebSocket (order status updates). The backend sends no CORS
    # headers, so we proxy it from the same origin.
    location @backend {
        set $backend_host fooddelivery-xidealo.amvera.io;
        proxy_pass https://$backend_host;
        proxy_set_header Host fooddelivery-xidealo.amvera.io;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
}
